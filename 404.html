<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect.
      // Keep first segment (repository name) and redirect to index with path encoded.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      var repoBase = l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/");
      var route = l.pathname.split("/").slice(1 + pathSegmentsToKeep).join("/");
      var search = l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "";
      l.replace(l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") + repoBase + "/?/" + route.replace(/&/g, "~and~") + search + l.hash);
    </script>
  </head>
  <body></body>
</html>
